<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#152B52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#skyGradient)"/>

  <!-- Stars -->
  <circle cx="200" cy="150" r="1.5" fill="#D4AF37" opacity="0.8"/>
  <circle cx="450" cy="200" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="800" cy="100" r="1.2" fill="#D4AF37" opacity="0.7"/>
  <circle cx="1200" cy="250" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="1600" cy="150" r="1.5" fill="#D4AF37" opacity="0.8"/>
  <circle cx="300" cy="350" r="0.8" fill="#D4AF37" opacity="0.5"/>
  <circle cx="1000" cy="400" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="1700" cy="300" r="1.2" fill="#D4AF37" opacity="0.7"/>

  <!-- Moon -->
  <circle cx="1750" cy="200" r="80" fill="#F5EDD0"/>
  <circle cx="1770" cy="190" r="80" fill="url(#skyGradient)"/>

  <!-- Ocean horizon -->
  <rect y="600" width="1920" height="480" fill="url(#oceanGradient)"/>

  <!-- Ocean waves (simplified) -->
  <path d="M0,600 Q480,550 960,600 T1920,600" stroke="#1E3A6E" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M0,650 Q480,620 960,650 T1920,650" stroke="#1E3A6E" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M0,700 Q480,680 960,700 T1920,700" stroke="#1E3A6E" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Distant lights (city lights reflection) -->
  <circle cx="300" cy="620" r="2" fill="#D4AF37" opacity="0.4"/>
  <circle cx="500" cy="630" r="1.5" fill="#D4AF37" opacity="0.3"/>
  <circle cx="750" cy="625" r="2" fill="#D4AF37" opacity="0.35"/>
  <circle cx="950" cy="635" r="1.5" fill="#D4AF37" opacity="0.3"/>
  <circle cx="1200" cy="628" r="2" fill="#D4AF37" opacity="0.4"/>
  <circle cx="1450" cy="633" r="1.5" fill="#D4AF37" opacity="0.3"/>
  <circle cx="1700" cy="620" r="2" fill="#D4AF37" opacity="0.35"/>

  <!-- Silhouette of mountains/coastline -->
  <path d="M0,700 L200,650 L400,680 L600,640 L800,670 L1000,620 L1200,660 L1400,630 L1600,680 L1800,640 L1920,700 L1920,1080 L0,1080 Z" fill="#0A1628" opacity="0.9"/>
</svg>
